name: 懸賞 daily 通知

on:
  schedule:
    - cron: "7 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 応募記録の取り込み（アプリ→applog）
        run: python sync_applog.py || echo "同期対象なし"
      - name: デイリーサマリー＋アプリ用JSON出力（収集は1回）
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --summary --export
      - name: 受取期限リマインダー
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python toolc.py remind --days 3 || echo "リマインダー対象なし"
      - name: 状態を保存
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f seen.json applog.json docs/app_feed.json llm_cache.json 2>/dev/null || true
          git commit -m "update state [skip ci]" || echo "no change"
          git pull --rebase origin main || true
          git push   # 状態(seen/applog/cache)の消失を防ぐため push 失敗は失敗として扱う（I）
